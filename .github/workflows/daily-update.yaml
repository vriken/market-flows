name: Daily Market Flows Update

on:
  schedule:
    # 7 AM UTC Mon-Fri
    - cron: '0 07 * * 1-5'
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily Strategy Backtest"]
    types: [completed]

concurrency:
  group: gh-pages-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: pytest

  update-dashboard:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout gh-pages (data + site)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ./main

      - name: Copy data from gh-pages to working dir
        run: |
          mkdir -p main/data
          cp -r gh-pages/data/* main/data/ 2>/dev/null || true

      - name: Update data and generate dashboard
        working-directory: main
        timeout-minutes: 15
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python generate_dashboard.py --data-dir data --output ../gh-pages/index.html

      - name: Verify dashboard was generated
        run: |
          if [ ! -f gh-pages/index.html ] || [ $(stat -c%s gh-pages/index.html) -lt 1000 ]; then
            echo "::error::Dashboard output missing or too small"
            exit 1
          fi

      - name: Copy updated data to gh-pages
        run: |
          mkdir -p gh-pages/data
          cp -r main/data/* gh-pages/data/

      - name: Commit and push to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
