name: Daily Strategy Backtest

on:
  schedule:
    # 8 AM UTC Mon-Fri — after US market close (previous day)
    - cron: '0 08 * * 1-5'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Strategy to test (orb,vwap,fvg,momentum,pdhl,daily,intraday,all)'
        default: 'all'
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        default: '2025-01-01'
      tickers:
        description: 'Tickers (comma-separated, or "default" for full universe)'
        default: 'default'

concurrency:
  group: gh-pages-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout gh-pages (cached data)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ./main

      - name: Restore cached backtest data
        run: |
          mkdir -p main/data/backtest
          cp -r gh-pages/data/backtest/* main/data/backtest/ 2>/dev/null || true
          echo "Cached data restored:"
          du -sh main/data/backtest/ 2>/dev/null || echo "  (empty)"

      - name: Run backtest (HTML report)
        working-directory: main
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'all' }}"
          START="${{ github.event.inputs.start_date || '2025-01-01' }}"
          TICKERS="${{ github.event.inputs.tickers || 'default' }}"

          ARGS="--strategy $STRATEGY --start $START --output html --output-path data/backtest/report.html"

          if [ "$TICKERS" != "default" ]; then
            ARGS="$ARGS --tickers $(echo $TICKERS | tr ',' ' ')"
          fi

          python -m market_flows.backtest.run_backtest $ARGS

      - name: Run backtest (CSV export)
        working-directory: main
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'all' }}"
          START="${{ github.event.inputs.start_date || '2025-01-01' }}"
          TICKERS="${{ github.event.inputs.tickers || 'default' }}"

          ARGS="--strategy $STRATEGY --start $START --output csv --output-path data/backtest/results"

          if [ "$TICKERS" != "default" ]; then
            ARGS="$ARGS --tickers $(echo $TICKERS | tr ',' ' ')"
          fi

          python -m market_flows.backtest.run_backtest $ARGS

      - name: Snapshot backtest summary for week-over-week tracking
        working-directory: main
        run: |
          if [ -f data/backtest/results_trades.csv ]; then
            python3 -c "
          import csv, json
          from collections import defaultdict
          from datetime import date
          from pathlib import Path
          stats = defaultdict(lambda: {'trades': 0, 'wins': 0, 'pnl': 0.0})
          with open('data/backtest/results_trades.csv') as f:
              for r in csv.DictReader(f):
                  s = r['strategy']
                  pnl = float(r['pnl'])
                  stats[s]['trades'] += 1
                  stats[s]['pnl'] += pnl
                  if pnl > 0: stats[s]['wins'] += 1
          today = str(date.today())
          snapshot = {'date': today, 'strategies': {name: {'trades': d['trades'], 'win_rate': round(100 * d['wins'] / d['trades'], 1) if d['trades'] else 0, 'total_pnl': round(d['pnl'], 2), 'avg_pnl': round(d['pnl'] / d['trades'], 2) if d['trades'] else 0} for name, d in sorted(stats.items())}}
          # Dedupe: remove existing snapshot for today before appending
          history = Path('data/backtest/history.jsonl')
          existing = []
          if history.exists():
              for line in history.read_text().strip().splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      entry = json.loads(line)
                      if entry.get('date') != today:
                          existing.append(line)
                  except json.JSONDecodeError:
                      existing.append(line)
          existing.append(json.dumps(snapshot))
          history.write_text('\n'.join(existing) + '\n')
          "
          fi

      - name: Copy backtest results + cached data to gh-pages
        run: |
          mkdir -p gh-pages/data/backtest
          # Copy reports
          cp main/data/backtest/report.html gh-pages/data/backtest/ 2>/dev/null || true
          cp main/data/backtest/results*.csv gh-pages/data/backtest/ 2>/dev/null || true
          cp main/data/backtest/history.jsonl gh-pages/data/backtest/ 2>/dev/null || true
          # Copy cached price data + regime history for next run
          cp main/data/backtest/regime_history.parquet gh-pages/data/backtest/ 2>/dev/null || true
          # Copy per-ticker cached data (daily + intraday parquets)
          for dir in main/data/backtest/*/; do
            ticker=$(basename "$dir")
            if [ "$ticker" != "." ]; then
              mkdir -p "gh-pages/data/backtest/$ticker"
              cp -r "$dir"* "gh-pages/data/backtest/$ticker/" 2>/dev/null || true
            fi
          done
          echo "Data to commit:"
          du -sh gh-pages/data/backtest/

      - name: Commit and push results
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backtest results $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
